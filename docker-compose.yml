version: '3.8'
services:
  daemon:
    build: ./daemon
    # container listens on 3008; accessed via reverse proxy
    ports:
      - "3008:3008"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NGINX_CONFIG_DIR=/deploy/nginx
      - NGINX_CONTAINER_NAME=reverse
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./deploy/nginx:/deploy/nginx

  panel-backend:
    build: ./panel/backend
    env_file: ./panel/backend/.env.example
    ports:
      - "4000:4000"
    depends_on:
      - db
    restart: unless-stopped

  panel-frontend:
    build: ./panel/frontend
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: panel
      POSTGRES_PASSWORD: panelpass
      POSTGRES_DB: panel
    volumes:
      - db_data:/var/lib/postgresql/data
  reverse:
    image: nginx:stable-alpine
    container_name: reverse
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - panel-frontend
      - panel-backend
      - daemon
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./deploy/nginx:/etc/nginx/conf.d:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
    restart: unless-stopped

volumes:
  db_data:

  
  # Reverse proxy for same-origin auth + routing
  
  
